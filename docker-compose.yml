version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scheduling-db
    environment:
      POSTGRES_DB: scheduling_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: scheduling-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: scheduling_db
      DB_USER: postgres
      DB_PASSWORD: password
      MAIL_HOST: smtp.mailtrap.io
      MAIL_PORT: 587
      MAIL_USER: medconnectfiap@gmail.com
      MAIL_PASSWORD: vuzh zanu qtnh tfsu
    depends_on:
      - db

volumes:
  postgres_data:
